<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nahla Calendar System</title>
  <!-- Google Fonts for the exact clean Monospace typography seen in the screenshot -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN for instant styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'Consolas', 'Courier New', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar matching Elite Odyssey UI style */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0d0f12;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #1d2228;
      border-radius: 2px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #5cb6e4;
    }
  </style>
</head>
<body class="min-h-screen bg-[#0d0f12] text-[#9ca4b0] p-4 md:p-6 font-sans selection:bg-[#5cb6e4]/30 selection:text-white">

  <!-- Main Container -->
  <div class="max-w-4xl mx-auto">
    
    <!-- Ship HUD Header matching Screenshot aesthetic -->
    <header class="border-b border-[#1d2228] pb-4 mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h1 class="text-xl md:text-2xl font-bold tracking-tight text-slate-100 mt-2 font-sans">
          NAHLA CALENDAR SYSTEM
        </h1>
        <p class="text-xs text-slate-500 mt-1 uppercase tracking-wider">
          System: Hypi Bra EV-P d5-78 | Orbiting Body: Rebekah (6) | Moon: Nahla (6 a)
        </p>
      </div>
    </header>

    <!-- Main Panel Content -->
    <div class="flex flex-col gap-6">
      
      <!-- Epoch Clock Panel -->
      <section class="bg-[#121519] border border-[#1d2228] rounded-lg p-5 shadow-lg relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-[#5cb6e4] to-transparent"></div>
        
        <div class="flex justify-between items-center mb-4 border-b border-[#1d2228]/40 pb-3">
          <span class="text-xs text-[#5cb6e4] font-bold uppercase tracking-widest font-sans">
            Telemetry & Telecommunications
          </span>
          <span id="epoch-ref" class="text-xs text-slate-500 font-medium font-mono">
            ---
          </span>
        </div>

        <!-- Master Telemetry Split Grid: Readout vs Countdown -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch">
          
          <!-- Left: Current Active Date Readout -->
          <div class="bg-[#0f1115] border border-[#1d2228] rounded p-4 flex flex-col justify-center items-center text-center relative min-h-[140px]">
            <!-- Date is now the primary dominant readout -->
            <div id="current-date-display" class="text-2xl md:text-3xl font-bold text-[#49d381] tracking-wider uppercase mb-1 font-mono">
              --
            </div>
            <!-- Year is now the smaller secondary anchor -->
            <div id="current-year-display" class="text-sm font-bold text-slate-300 tracking-widest uppercase mt-0.5 font-mono">
              YEAR --
            </div>
            <div id="current-phase-display" class="text-xs text-slate-400 uppercase tracking-widest mt-2">
              --
            </div>
          </div>

          <!-- Right: T-Minus Target Tracking -->
          <div class="flex flex-col justify-center">
            <div id="target-milestone-label" class="text-center text-xs text-slate-400 tracking-widest uppercase mb-3">
              T-Minus to <span class="text-[#5cb6e4] font-bold">---</span>
            </div>
            <div class="grid grid-cols-5 gap-1.5 text-center font-semibold font-mono">
              <div class="bg-[#0f1115] border border-[#1d2228] rounded p-2">
                <div id="countdown-days" class="text-xl font-bold text-[#5cb6e4]">00</div>
                <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5 font-sans">Days</div>
              </div>
              <div class="bg-[#0f1115] border border-[#1d2228] rounded p-2">
                <div id="countdown-hours" class="text-xl font-bold text-[#5cb6e4]">00</div>
                <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5 font-sans">Hours</div>
              </div>
              <div class="bg-[#0f1115] border border-[#1d2228] rounded p-2">
                <div id="countdown-mins" class="text-xl font-bold text-[#5cb6e4]">00</div>
                <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5 font-sans">Mins</div>
              </div>
              <div class="bg-[#0f1115] border border-[#1d2228] rounded p-2">
                <div id="countdown-secs" class="text-xl font-bold text-[#5cb6e4]">00</div>
                <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5 font-sans">Secs</div>
              </div>
              <div class="bg-[#0f1115] border border-[#1d2228] rounded p-2">
                <div id="countdown-ds" class="text-xl font-bold text-[#5cb6e4]">0</div>
                <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5 font-sans">Ds</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Dynamic Status / Progression -->
        <div id="progression-container" class="mt-4 pt-3 border-t border-[#1d2228]/40">
          <div id="progress-bar-container" class="w-full bg-[#0f1115] border border-[#1d2228] rounded h-2 overflow-hidden">
            <div id="progress-bar-fill" class="bg-[#5cb6e4] shadow-[0_0_8px_rgba(92,182,228,0.7)] h-full transition-all duration-300" style="width: 0%"></div>
          </div>
          <p id="progression-text" class="text-xs text-slate-400 text-center mt-2 font-medium">
            --
          </p>
        </div>
      </section>

      <!-- Calendar Grid Panel -->
      <section class="bg-[#121519] border border-[#1d2228] rounded-lg p-5 shadow-lg">
        <h3 class="text-xs text-[#5cb6e4] mb-4 uppercase tracking-widest font-semibold">
          The 555-Day Sumerian Calendar Grid
        </h3>

        <!-- 12 Months Grid -->
        <div id="months-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mb-6">
          <!-- Populated dynamically via JS -->
        </div>

        <!-- Selected Month Detail Box -->
        <div id="month-details" class="bg-[#0f1115] border border-[#1d2228] rounded p-4">
          <!-- Populated dynamically via JS on selection -->
        </div>
      </section>

    </div>

  </div>

  <script>
    // Constants sourced directly from the CMDR's Elite Dangerous Journal Scans
    // Calibration updated to: July 3, 2026, 06:58:00 UTC
    const EPOCH_UTC = Date.UTC(2026, 6, 3, 6, 58, 0); 
    const ROTATION_ANCHOR_UTC = Date.UTC(2025, 6, 20, 19, 8, 49); // Scan timestamp

    const MONTHS_LORE = [
      { name: "Anat", desc: "Goddess of fierce beginnings, war, and rebirth. Welcomes the searing light of Perihelion.", alignment: "Start of Year / Peak Sunlight" },
      { name: "Bau", desc: "Primeval goddess of the healing dawn and the life-giving breath.", alignment: "Late Morning Orbit" },
      { name: "Uzzayan", desc: "Himyarite goddess of power, might, and healing. Invoked to strengthen the will and heal the sick.", alignment: "Approaching Outer Orbit" },
      { name: "Gula", desc: "Goddess of medicine, healing, and grand transformations.", alignment: "High Horizon Phase" },
      { name: "Shams", desc: "The brilliant pre-Islamic sun goddess, lord of the heavens, bringing light and vital warmth.", alignment: "Stellar Apex Alignment" },
      { name: "Ki", desc: "The Earth goddess. Honoring Nahla's dense, metal-rich planetary crust.", alignment: "Peak Magnetic Alignment" },
      { name: "Mot", desc: "God of dust, sterility, and the burning heat of the primary star.", alignment: "Extreme Heat Run" },
      { name: "Nanaya", desc: "Goddess of cosmic love, beauty, and the gravitationally locked bond of giant and moon.", alignment: "Tidal Symmetrical Node" },
      { name: "Tanuf", desc: "Pre-Islamic South Arabian goddess of high mountain peaks, offering shelter and safe passages through the shadows of the descending orbit.", alignment: "Descending Node" },
      { name: "Nisaba", desc: "Goddess of writing, cosmic records, and mapping the stars.", alignment: "Apsidal Alignment" },
      { name: "Sara", desc: "Guardian of deep subterranean vaults and active metallic magma flows.", alignment: "Volcanic Surge Era" },
      { name: "Uttu", desc: "Goddess of weaving, spinning the magnificent geometric webs of Rebekah's rings.", alignment: "Ring Crossing Horizon" }
    ];

    let selectedMonthIndex = 0; // State tracker for current active grid view (0-11, or -1 for Kurunnītu)

    // Leap Year checks (Years 5, 11, 16, 22, 28)
    function isNahlaLeapYear(year) {
      if (year <= 0) return false;
      const yearInCycle = ((year - 1) % 28) + 1;
      return [5, 11, 16, 22, 28].includes(yearInCycle);
    }

    function getDaysInNahlaYear(year) {
      return isNahlaLeapYear(year) ? 556 : 555;
    }

    // Main calendar logic engine supporting Year 0 backward coordinates perfectly
    function getNahlaCalendarDate(utcMillis) {
      const DAY_MS = 86400 * 1000;
      let year, dayOfYear, msInCurrentDay, totalDaysInYear;
      
      if (utcMillis >= EPOCH_UTC) {
        // Year 1+ Standard Progression
        let remainingMs = utcMillis - EPOCH_UTC;
        year = 1;
        while (true) {
          const yearMs = getDaysInNahlaYear(year) * DAY_MS;
          if (remainingMs < yearMs) {
            break;
          }
          remainingMs -= yearMs;
          year++;
        }
        dayOfYear = Math.floor(remainingMs / DAY_MS) + 1;
        msInCurrentDay = remainingMs % DAY_MS;
        totalDaysInYear = getDaysInNahlaYear(year);
      } else {
        // Year 0 Backward Offset Matrix
        let remainingMs = EPOCH_UTC - utcMillis;
        year = 0;
        while (true) {
          const yearMs = getDaysInNahlaYear(year) * DAY_MS;
          if (remainingMs <= yearMs) {
            break;
          }
          remainingMs -= yearMs;
          year--;
        }
        totalDaysInYear = getDaysInNahlaYear(year);
        let msFromStartOfYear = (totalDaysInYear * DAY_MS) - remainingMs;
        dayOfYear = Math.floor(msFromStartOfYear / DAY_MS) + 1;
        msInCurrentDay = msFromStartOfYear % DAY_MS;
      }

      const msLeftInCurrentDay = DAY_MS - msInCurrentDay;
      let monthIndex = -1;
      let dayOfMonth = 0;
      let isIntercalary = false;
      let msUntilNextMilestone = 0;
      let nextMilestoneName = "";

      if (dayOfYear <= 552) {
        monthIndex = Math.floor((dayOfYear - 1) / 46);
        dayOfMonth = ((dayOfYear - 1) % 46) + 1;
        const daysRemainingInMonth = 46 - dayOfMonth;
        msUntilNextMilestone = (daysRemainingInMonth * DAY_MS) + msLeftInCurrentDay;
        nextMilestoneName = monthIndex === 11 ? "Festival of Kurunnītu" : `${MONTHS_LORE[monthIndex + 1].name} 1`;
      } else {
        isIntercalary = true;
        dayOfMonth = dayOfYear - 552;
        const daysRemainingInFestival = totalDaysInYear - dayOfYear;
        msUntilNextMilestone = (daysRemainingInFestival * DAY_MS) + msLeftInCurrentDay;
        nextMilestoneName = `Year ${year + 1}, Anat 1 (Perihelion)`;
      }

      return {
        isYearZero: year === 0,
        year,
        dayOfYear,
        monthIndex,
        dayOfMonth,
        isIntercalary,
        msInCurrentDay,
        totalDaysInYear,
        msUntilNextMilestone,
        nextMilestoneName
      };
    }

    // Build the month layout buttons and register click events
    function renderCalendarGrid(currentMonthIndex, isYearZero, isIntercalary) {
      const gridContainer = document.getElementById('months-grid');
      gridContainer.innerHTML = ''; // reset

      MONTHS_LORE.forEach((month, idx) => {
        const isActive = currentMonthIndex === idx;
        const isSelected = selectedMonthIndex === idx;

        const button = document.createElement('button');
        button.className = `p-3 rounded border text-left transition-all ${
          isActive 
            ? 'bg-[#49d381]/5 border-[#49d381] text-[#49d381]' 
            : isSelected
            ? 'bg-[#5cb6e4]/10 border-[#5cb6e4] text-[#5cb6e4]'
            : 'bg-[#121519] border-[#1d2228] text-slate-400 hover:border-slate-700 hover:bg-[#15191e]'
        }`;

        button.innerHTML = `
          <div class="flex justify-between items-start">
            <span class="text-xs text-slate-400 font-medium font-sans">M ${idx + 1}</span>
            ${isActive ? '<span class="text-[10px] uppercase bg-[#49d381]/10 text-[#49d381] px-2 py-0.5 rounded font-bold animate-pulse font-sans">Active</span>' : ''}
          </div>
          <div class="text-base font-bold text-slate-200 mt-1 font-sans">${month.name}</div>
          <div class="text-xs text-slate-400 mt-0.5 font-sans">46 Days</div>
        `;

        button.addEventListener('click', () => {
          selectedMonthIndex = idx;
          updateMonthDetails();
          // Rerender grid to shift selections
          const activeCal = getNahlaCalendarDate(Date.now());
          renderCalendarGrid(activeCal.monthIndex, activeCal.isYearZero, activeCal.isIntercalary);
        });

        gridContainer.appendChild(button);
      });

      // Append Festival of Kurunnītu button at the end
      const isFestivalActive = isIntercalary;
      const isFestivalSelected = selectedMonthIndex === -1;
      const festivalButton = document.createElement('button');
      festivalButton.className = `col-span-2 sm:col-span-3 md:col-span-4 p-3 rounded border text-left transition-all ${
        isFestivalActive
          ? 'bg-purple-950/20 border-purple-500 text-purple-400'
          : isFestivalSelected
          ? 'bg-purple-950/20 border-purple-400 text-purple-300'
          : 'bg-[#121519] border-[#1d2228] text-slate-400 hover:border-slate-700 hover:bg-[#15191e]'
      }`;

      festivalButton.innerHTML = `
        <div class="flex justify-between items-center">
          <div>
            <span class="text-xs text-slate-400 font-medium font-sans">Un-Month Cycle</span>
            <div class="text-base font-bold text-purple-300 mt-0.5 font-sans">Festival of Kurunnītu (Intercalary Days)</div>
          </div>
          <div class="text-right flex flex-col items-end gap-1">
            <span class="text-xs text-slate-400 block font-sans">3 Days (4 in Leap)</span>
            <span class="text-[10px] text-purple-400 bg-purple-500/10 px-2 py-0.5 rounded font-bold uppercase tracking-wider font-sans">
              Interregna
            </span>
          </div>
        </div>
      `;

      festivalButton.addEventListener('click', () => {
        selectedMonthIndex = -1;
        updateMonthDetails();
        const activeCal = getNahlaCalendarDate(Date.now());
        renderCalendarGrid(activeCal.monthIndex, activeCal.isYearZero, activeCal.isIntercalary);
      });

      gridContainer.appendChild(festivalButton);
    }

    // Render Lore Details card based on current selected month
    function updateMonthDetails() {
      const detailsContainer = document.getElementById('month-details');

      if (selectedMonthIndex === -1) {
        detailsContainer.innerHTML = `
          <div>
            <h4 class="text-base font-bold text-purple-400 uppercase font-sans">
              The Festival of Kurunnītu
            </h4>
            <p class="text-xs text-slate-500 italic mt-0.5 font-sans">
              Traditional Mesopotamian sweet-beer celebration sitting completely outside standard months.
            </p>
            <p class="text-sm text-slate-300 mt-2.5 leading-relaxed font-sans">
              Named after Kurunnītu, the divine sweet red beer of offerings and divine celebration. This 3-day (4-day in leap years) period represents the transition zone of celestial rest. Standard chronometer measurements pause while Rebekah reaches maximum orbital speeds, honoring the cosmic harvest immediately before resetting back to Anat 1 at Perihelion.
            </p>
            <div class="mt-3 inline-flex items-center gap-1.5 text-xs text-purple-400 font-sans">
              <span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span>
              Occurs: End of Month 12 (Uttu) / Prior to Perihelion
            </div>
          </div>
        `;
      } else {
        const month = MONTHS_LORE[selectedMonthIndex];
        detailsContainer.innerHTML = `
          <div>
            <div class="flex justify-between items-start">
              <h4 class="text-base font-bold text-[#5cb6e4] uppercase font-sans">
                Month ${selectedMonthIndex + 1}: ${month.name}
              </h4>
              <span class="text-xs text-slate-400 bg-[#0f1115] px-2.5 py-1 rounded border border-[#1d2228] font-mono">
                Standard Length: 46 Days
              </span>
            </div>
            <p class="text-xs text-slate-500 italic mt-0.5 font-sans">
              Celestial Alignment & Influence
            </p>
            <p class="text-sm text-slate-300 mt-2.5 leading-relaxed font-sans">
              ${month.desc}
            </p>
            <div class="mt-3 inline-flex items-center gap-1.5 text-xs text-[#5cb6e4] font-sans">
              <span class="w-1.5 h-1.5 rounded-full bg-[#5cb6e4]"></span>
              Observatory Alignment: ${month.alignment}
            </div>
          </div>
        `;
      }
    }

    // Core Clock and Countdown updater loop
    function updateClock() {
      const now = Date.now();
      
      // Compute calendar coordinates
      const nDate = getNahlaCalendarDate(now);

      // Handle epoch reference labels
      const epochRefSpan = document.getElementById('epoch-ref');
      if (nDate.isYearZero) {
        epochRefSpan.innerText = "Target Epoch: 2026-07-03 06:58:00 UTC";
      } else {
        epochRefSpan.innerText = `Year Alignment: Year ${nDate.year}`;
      }

      // Update Live Telemetry Readings inside Dashboard
      document.getElementById('current-year-display').innerText = `YEAR ${nDate.year}`;
      
      const currentDateDisplay = document.getElementById('current-date-display');
      const currentPhaseDisplay = document.getElementById('current-phase-display');
      
      if (nDate.isIntercalary) {
        currentDateDisplay.innerText = `Festival of Kurunnītu, Day ${nDate.dayOfMonth}`;
        currentDateDisplay.className = "text-xl md:text-2xl text-purple-400 font-bold tracking-wider uppercase mb-1 font-mono animate-pulse";
        currentPhaseDisplay.innerText = "Intercalary Transition Period";
        currentPhaseDisplay.className = "text-xs text-purple-300 uppercase tracking-widest mt-2";
      } else {
        currentDateDisplay.innerText = `${MONTHS_LORE[nDate.monthIndex].name} ${nDate.dayOfMonth}`;
        currentDateDisplay.className = "text-2xl md:text-3xl font-bold text-[#49d381] tracking-wider uppercase mb-1 font-mono";
        currentPhaseDisplay.innerText = `Month ${nDate.monthIndex + 1} — Standard Phase`;
        currentPhaseDisplay.className = "text-xs text-slate-400 uppercase tracking-widest mt-2";
      }

      // Update T-Minus targeted label
      document.getElementById('target-milestone-label').innerHTML = `T-Minus to <span class="text-[#5cb6e4] font-bold">${nDate.nextMilestoneName}</span>`;

      // Calculate and push countdown metrics
      const totalSecs = Math.floor(nDate.msUntilNextMilestone / 1000);
      const days = Math.floor(totalSecs / 86400);
      const hours = Math.floor((totalSecs % 86400) / 3600);
      const mins = Math.floor((totalSecs % 3600) / 60);
      const secs = totalSecs % 60;
      const decisecond = Math.floor((nDate.msUntilNextMilestone % 1000) / 100);

      document.getElementById('countdown-days').innerText = days;
      document.getElementById('countdown-hours').innerText = hours.toString().padStart(2, '0');
      document.getElementById('countdown-mins').innerText = mins.toString().padStart(2, '0');
      document.getElementById('countdown-secs').innerText = secs.toString().padStart(2, '0');
      document.getElementById('countdown-ds').innerText = decisecond;

      // Update progress bar or progress tracker text
      const progressBarFill = document.getElementById('progress-bar-fill');
      const progressionText = document.getElementById('progression-text');

      if (nDate.isYearZero) {
        // Calculate Year 0 progress towards Epoch
        const totalDurationMs = 555 * 86400 * 1000;
        const msIntoYearZero = (nDate.dayOfYear - 1) * 86400 * 1000 + nDate.msInCurrentDay;
        const progressPct = Math.min(100, (msIntoYearZero / totalDurationMs) * 100);
        
        progressBarFill.style.width = `${progressPct}%`;
        progressionText.innerText = `Day ${nDate.dayOfYear} of ${nDate.totalDaysInYear} (${progressPct.toFixed(2)}%) | Synchronizing loops with Perihelion Alignment`;
      } else {
        const progressPct = (nDate.dayOfYear / nDate.totalDaysInYear) * 100;
        progressBarFill.style.width = `${progressPct}%`;
        progressionText.innerText = `Day ${nDate.dayOfYear} of ${nDate.totalDaysInYear} | ${progressPct.toFixed(2)}% orbital progression complete.`;
      }
    }

    // Initialize application on load
    window.onload = function() {
      // Calculate initial setup
      const activeCal = getNahlaCalendarDate(Date.now());
      
      // Select the current month dynamically on launch (works beautifully for both Year 0 and Year 1+)
      selectedMonthIndex = activeCal.isIntercalary ? -1 : activeCal.monthIndex;

      // Initial layouts
      renderCalendarGrid(activeCal.monthIndex, activeCal.isYearZero, activeCal.isIntercalary);
      updateMonthDetails();
      updateClock();

      // Start the heartbeat loop
      setInterval(() => {
        updateClock();
      }, 100);
    }
  </script>
</body>
</html>
